<!doctype html>
<html lang="en">
  <head>
    <script src="/boot/boot-admin-redirect.js"></script>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="K2 Galerie" />
    <link rel="apple-touch-icon" href="/vite.svg" />
    <!-- Kein statisches link rel=manifest: Safari würde sonst zuerst manifest.json (start_url /galerie) für „Zum Home-Bildschirm“ cachen, bevor JS auf K2-Familie-Manifest umschaltet. -->
    <script src="/boot/boot-manifest.js"></script>
    <link rel="preconnect" href="https://k2-galerie.vercel.app" />
    <link rel="dns-prefetch" href="https://k2-galerie.vercel.app" />
    <title>K2 Galerie</title>
    <meta name="description" content="K2 Galerie - Entdecke die Verbindung von Malerei und Keramik. Werke von Martina und Georg Kreinecker." />
  </head>
  <body style="margin: 0; padding: 0; background: #1a0f0a;">
    <!-- K2 Theme: Orange sofort setzen (auch für Mobil), bevor React/localStorage laufen -->
    <script src="/boot/boot-theme.js"></script>
    <!-- Stand / QR / Cache-Bust: Timestamp wird beim Build in diese Datei geschrieben (scripts/write-build-info.js). -->
    <script src="/boot/boot-build-info.js"></script>
    <div id="root" style="min-height: 100vh; background: #1a0f0a; display: flex; align-items: center; justify-content: center; cursor: pointer;">
      <div id="root-loading" style="text-align:center;color:rgba(255,255,255,0.9);font-family:system-ui;padding:2rem;">
        <p style="margin:0 0 0.5rem;font-size:1.1rem;">Laden …</p>
        <p style="margin:0;font-size:0.85rem;color:rgba(255,255,255,0.6);">Nach QR-Scan: Warte kurz.<br>Lädt nicht? Tippe hier zum Neuladen.</p>
      </div>
    </div>
    <script src="/boot/boot-root-interaction.js"></script>
    <!-- Stand-Badge wird von der App (React) gerendert – sichtbar auf Mac, iPad und Handy -->
    <script type="module" src="/src/main.tsx"></script>
    <noscript>
      <div style="padding: 2rem; color: white; background: #1a0f0a; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center;">
        <div>
          <h1>JavaScript erforderlich</h1>
          <p>Bitte aktiviere JavaScript in deinem Browser um die K2 Galerie zu verwenden.</p>
        </div>
      </div>
    </noscript>
  </body>
</html>
