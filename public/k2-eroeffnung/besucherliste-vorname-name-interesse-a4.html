<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Besucherliste – A4 Quer, 10 pro Seite</title>
  <style>
    :root {
      --teal: #0f766e;
      --teal-d: #0c5c55;
      --ink: #1c1a18;
      --muted: #5c5650;
      --line: #c4bfb8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #e8e4df;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Source Sans 3', sans-serif;
      font-size: 10pt;
      line-height: 1.4;
    }
    .page {
      max-width: 297mm;
      min-height: 210mm;
      margin: 0 auto 12px;
      background: #fffefb;
      padding: 10mm 12mm 10mm;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 15pt;
      font-weight: 800;
      color: var(--teal-d);
      margin: 0 0 3mm;
      letter-spacing: -0.02em;
    }
    .h2-fort {
      font-size: 12pt;
      font-weight: 800;
      color: var(--teal-d);
      margin: 0 0 2mm;
    }
    .einleitung {
      font-size: 10pt;
      color: var(--ink);
      margin: 0 0 5mm;
      line-height: 1.5;
      max-width: 99%;
    }
    .einleitung strong { color: var(--teal-d); }
    .sub {
      font-size: 9pt;
      color: var(--muted);
      margin: 0 0 4mm;
    }
    .seitenhinweis {
      font-size: 8.5pt;
      color: var(--teal-d);
      font-weight: 700;
      margin: 0 0 4mm;
    }
    .hinweis {
      font-size: 8.5pt;
      color: var(--muted);
      background: rgba(15, 118, 110, 0.08);
      border-left: 3px solid var(--teal);
      padding: 2mm 3mm;
      margin: 0 0 4mm;
    }
    .no-print { }
    table.liste {
      width: 100%;
      border-collapse: collapse;
      font-size: 8.5pt;
      table-layout: fixed;
    }
    table.liste th,
    table.liste td {
      border: 1px solid var(--line);
      padding: 1.4mm 2mm;
      vertical-align: middle;
    }
    table.liste th {
      background: rgba(15, 118, 110, 0.12);
      color: var(--teal-d);
      font-weight: 800;
      text-align: left;
    }
    col.nr { width: 3.2%; }
    col.vn { width: 11.5%; }
    col.nn { width: 11.5%; }
    col.tel { width: 13%; }
    col.mail { width: 16%; }
    col.in { width: 44.8%; }
    td.nr { text-align: center; color: var(--muted); font-weight: 600; }
    .th-sub {
      display: block;
      font-weight: 600;
      font-size: 7.2pt;
      color: var(--muted);
      margin-top: 0.5mm;
    }
    .inter-cell {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 1.1mm;
      min-height: 18mm;
      padding: 0.5mm 0 0.6mm;
    }
    .k {
      display: flex;
      align-items: flex-start;
      gap: 1.2mm;
      font-size: 7.5pt;
      font-weight: 600;
      color: var(--teal-d);
      line-height: 1.25;
      max-width: 100%;
    }
    .k-long { font-size: 7.1pt; }
    .k i {
      display: inline-block;
      width: 3.5mm;
      height: 3.5mm;
      border: 1.2px solid var(--teal);
      border-radius: 1px;
      flex-shrink: 0;
      margin-top: 0.2mm;
    }
    .fuss {
      margin-top: 3mm;
      font-size: 7pt;
      color: var(--muted);
      text-align: center;
    }
    /* Langer Text am Bildschirm, kurze Zeile im Druck → passt auf 1× A4 Quer */
    .einleitung--druck {
      display: none;
    }
    /* Druck: niedrigere Ränder + kompakte Tabelle, damit 10 Zeilen + Kopf wirklich auf 1 Blatt passen */
    @media print {
      @page {
        size: A4 landscape;
        margin: 8mm 10mm;
      }
      html,
      body {
        width: 100%;
        height: auto;
        margin: 0;
        background: #fff !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        color-adjust: exact;
      }
      .page {
        box-shadow: none;
        min-height: auto;
        margin: 0;
        padding: 0;
        max-width: none;
        page-break-after: always;
        /* nicht „alles auf ein Blatt vermeiden“ – sonst bricht WebKit mitten in der Tabelle (4 Druckseiten) */
        page-break-inside: auto;
        break-inside: auto;
        overflow: visible;
      }
      .page:last-of-type { page-break-after: auto; }
      .no-print { display: none !important; }
      .einleitung--bildschirm { display: none !important; }
      .einleitung--druck {
        display: block !important;
        font-size: 7.5pt;
        line-height: 1.3;
        margin: 0 0 1.5mm;
        max-width: 100%;
      }
      .sub { display: none !important; }
      h1 { font-size: 10.5pt; margin: 0 0 1.2mm; }
      h2.h2-fort { font-size: 9.5pt; margin: 0 0 1mm; }
      .seitenhinweis { font-size: 7pt; margin: 0 0 1.2mm; }
      table.liste {
        width: 100%;
        max-width: 100%;
        font-size: 6.5pt;
        table-layout: fixed;
      }
      table.liste thead {
        display: table-header-group;
      }
      table.liste th,
      table.liste td {
        padding: 0.45mm 1mm;
        border: 0.35pt solid var(--line);
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .th-sub { font-size: 5.5pt; margin-top: 0.2mm; }
      .inter-cell {
        min-height: 0;
        gap: 0.28mm;
        padding: 0.15mm 0 0.2mm;
      }
      .k {
        font-size: 5.4pt;
        line-height: 1.1;
        gap: 0.4mm;
      }
      .k-long { font-size: 5.1pt; }
      .k i {
        width: 2.5mm;
        height: 2.5mm;
        border-width: 0.4pt;
        margin-top: 0.1mm;
      }
      .fuss { margin-top: 1mm; font-size: 5.5pt; }
      tr { page-break-inside: avoid; break-inside: avoid; }
    }
  </style>
</head>
<body>
  <div id="seiten"></div>
  <p class="no-print" style="text-align: center; padding: 10px; font-size: 10pt; color: #5c5650">
    <a href="javascript:window.print()" style="color: #0f766e; font-weight: 700">Drucken</a>
    &nbsp;·&nbsp; A4 Quer · 10 Zeilen pro Seite
    &nbsp;·&nbsp; Grauer Tabellenkopf: im Druckdialog <strong>Hintergrund drucken</strong> aktivieren
    &nbsp;·&nbsp;
    <code style="font-size: 0.9em">/k2-eroeffnung/besucherliste-vorname-name-interesse-a4.html</code>
  </p>
  <script>
    (function () {
      var ZEILEN_PRO_SEITE = 10
      var SEITEN = 2
      var interesse =
        '<span class="k"><i aria-hidden="true"></i> Galerie / Ausstellung</span>' +
        '<span class="k k-long"><i aria-hidden="true"></i> Software – meine eigene Plattform</span>' +
        '<span class="k"><i aria-hidden="true"></i> Vereinsplattform</span>' +
        '<span class="k"><i aria-hidden="true"></i> K2 Familie</span>'

      var colgroup =
        '<colgroup><col class="nr" /><col class="vn" /><col class="nn" /><col class="tel" /><col class="mail" /><col class="in" /></colgroup>'

      var thead =
        '<thead><tr>' +
        '<th scope="col">Nr.</th><th scope="col">Vorname</th><th scope="col">Name</th>' +
        '<th scope="col">Tel.</th><th scope="col">E-Mail</th>' +
        '<th scope="col">Interesse <span class="th-sub">Galerie/Ausstellung, Software, Vereinsplattform, K2 Familie</span></th>' +
        '</tr></thead>'

      function zeilenHtml(startNr, anzahl) {
        var s = '<tbody>'
        for (var j = 0; j < anzahl; j++) {
          var nr = startNr + j
          s +=
            '<tr><td class="nr">' +
            nr +
            '</td><td></td><td></td><td></td><td></td><td><div class="inter-cell">' +
            interesse +
            '</div></td></tr>'
        }
        return s + '</tbody>'
      }

      var host = document.getElementById('seiten')
      for (var p = 0; p < SEITEN; p++) {
        var page = document.createElement('div')
        page.className = 'page'
        if (p === 0) {
          page.innerHTML =
            '<h1>Herzlich willkommen – danke für deinen Besuch</h1>' +
            '<p class="einleitung einleitung--bildschirm">' +
            'Schön, dass du in der <strong>K2 Galerie Kunst&amp;Keramik</strong> bei uns vorbeischaust. ' +
            '<strong>Bitte</strong> trag – wenn du magst – deine Daten ein und kreuz an, wofür du dich interessierst: ' +
            '<strong>Galerie / Ausstellung</strong>, <strong>Software (eigene Plattform)</strong>, <strong>Vereinsplattform</strong> oder <strong>K2 Familie</strong> – gerne auch mehrere. ' +
            'Dann können wir uns bei dir melden und dich passend informieren. Danke.</p>' +
            '<p class="einleitung einleitung--druck" aria-hidden="true">' +
            'Willkommen in der <strong>K2 Galerie Kunst&amp;Keramik</strong>. ' +
            'Bitte eintragen und ankreuzen, wofür du dich interessierst' +
            ' (Galerie/Ausstellung, Software, Vereinsplattform, K2 Familie) – gern mehrere. Danke.</p>' +
            '<p class="sub">Zum Ausfüllen am Tisch · Handschrift · je 10 Personen pro Seite</p>' +
            '<p class="hinweis no-print"><strong>Drucken:</strong> A4 <strong>Querformat</strong>. ' +
            '<strong>Seite 1 + 2</strong> – weitere Seiten: in diesem HTML <code>SEITEN</code> in der &lt;script&gt;-Sektion erhöhen (je +10 Zeilen).</p>' +
            '<p class="seitenhinweis">Seite 1</p>' +
            '<table class="liste" aria-label="Besucherliste Seite 1">' +
            colgroup +
            thead +
            zeilenHtml(1, ZEILEN_PRO_SEITE) +
            '</table>' +
            '<footer class="fuss">kgm solution · K2 Galerie – intern / Veranstaltung</footer>'
        } else {
          var seite = p + 1
          page.innerHTML =
            '<h2 class="h2-fort">Besucherliste – Fortsetzung</h2>' +
            '<p class="seitenhinweis">Seite ' + seite + ' · A4 Quer</p>' +
            '<table class="liste" aria-label="Besucherliste Seite ' + seite + '">' +
            colgroup +
            thead +
            zeilenHtml(p * ZEILEN_PRO_SEITE + 1, ZEILEN_PRO_SEITE) +
            '</table>' +
            '<footer class="fuss">kgm solution · K2 Galerie – intern / Veranstaltung</footer>'
        }
        host.appendChild(page)
      }
    })()
  </script>
</body>
</html>
