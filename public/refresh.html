<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>K2 Galerie – Aktualisiere …</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #1a0f0a; color: #fff5f0; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 1.5rem; box-sizing: border-box; }
    .box { max-width: 320px; }
    h1 { font-size: 1.25rem; margin: 0 0 0.75rem; }
    p { margin: 0; font-size: 0.95rem; color: rgba(255,245,240,0.85); line-height: 1.5; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Lade neueste Version …</h1>
    <p>Du wirst gleich zur Galerie weitergeleitet.<br>Falls nicht, tippe <a href="/" style="color: #ff8c42;">hier</a>.</p>
  </div>
  <script>
    (function() {
      var o = location.origin;
      var t = Date.now();
      var params = new URLSearchParams(location.search);
      var returnPath = params.get('return') || '';

      // Cache/Service-Worker möglichst räumen, ohne Nutzerdaten anzutasten.
      // Wichtig: KEIN localStorage.clear() – Werke/Stammdaten bleiben erhalten.
      var tasks = [];
      try {
        if ('caches' in window && window.caches && typeof window.caches.keys === 'function') {
          tasks.push(
            window.caches.keys().then(function(names) {
              try {
                return Promise.all(names.map(function(name) {
                  try { return window.caches.delete(name); } catch (e) { return Promise.resolve(false); }
                }));
              } catch (e) { return Promise.resolve(); }
            }).catch(function() {})
          );
        }
      } catch (e) {}
      try {
        if (navigator && navigator.serviceWorker && typeof navigator.serviceWorker.getRegistrations === 'function') {
          tasks.push(
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              try {
                return Promise.all(regs.map(function(r) {
                  try { return r.unregister(); } catch (e) { return Promise.resolve(false); }
                }));
              } catch (e) { return Promise.resolve(); }
            }).catch(function() {})
          );
        }
      } catch (e) {}
      try {
        if (window.sessionStorage) {
          sessionStorage.removeItem('k2_updated');
          sessionStorage.removeItem('k2_stale_reload');
        }
      } catch (e) {}

      var go = function() {
        if (returnPath && returnPath.indexOf('/') === 0) {
          var hash = '';
          var hashIdx = returnPath.indexOf('#');
          if (hashIdx !== -1) {
            hash = returnPath.slice(hashIdx);
            returnPath = returnPath.slice(0, hashIdx);
          }
          var sep = returnPath.indexOf('?') !== -1 ? '&' : '?';
          location.replace(o + returnPath + sep + 'v=' + t + '&_=' + t + hash);
        } else {
          location.replace(o + '/?v=' + t + '&_=' + t);
        }
      };

      // iOS/PWA: gib dem Cleanup kurz Zeit, sonst Mischstand möglich
      try {
        Promise.allSettled(tasks).then(function() { setTimeout(go, 150); });
        setTimeout(go, 600); // Fallback: nie hängen bleiben
      } catch (e) {
        setTimeout(go, 200);
      }
    })();
  </script>
</body>
</html>
