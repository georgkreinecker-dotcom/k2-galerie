name: K2 Galerie – Tests und Build (QS)

# Wann läuft das automatisch?
on:
  push:
    branches: [main]       # Bei jedem Push auf main
  pull_request:
    branches: [main]       # Bei jedem Pull Request

jobs:
  test-and-build:
    name: Tests + voller Build
    runs-on: ubuntu-latest

    steps:
      - name: Code holen
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Abhängigkeiten installieren
        run: npm ci

      # Hinweis: Kein separates `npm run lint` hier – das Repo hat noch viele
      # ESLint-Befunde im echten Code; die lokale QS-Kette ist `qs:sportwagen`
      # (Tests + kritische Schranken + Guards + Diagnose + Build), ohne Lint.
      # ESLint-Allowlist: eslint.config.js (`lintTsFiles`) – Figma-HTML mit .tsx nicht anfassen.

      - name: Sportwagenmodus QS (zentral)
        run: npm run qs:sportwagen
