name: K2 Galerie – Tests und Build (QS)

# Wann läuft das automatisch?
on:
  push:
    branches: [main]       # Bei jedem Push auf main
  pull_request:
    branches: [main]       # Bei jedem Pull Request

jobs:
  test-and-build:
    name: Tests + voller Build
    runs-on: ubuntu-latest

    steps:
      - name: Code holen
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Abhängigkeiten installieren
        run: npm ci

      # Hinweis: Kein separates `npm run lint` hier – das Repo hat noch viele
      # ESLint-Befunde im echten Code; die lokale QS-Kette ist `qs:sportwagen`
      # (Tests + kritische Schranken + Guards + Diagnose + Build), ohne Lint.
      # ESLint-Allowlist: eslint.config.js (`lintTsFiles`) – Figma-HTML mit .tsx nicht anfassen.

      - name: Sportwagenmodus QS (zentral)
        run: npm run qs:sportwagen

  # Gleicher Install + Build wie Vercel Production (ohne Tests) – fängt Node-Vite-Mismatch und omit=dev-Probleme
  vercel-production-parity:
    name: Vercel-Parität (npm ci --omit=dev + build:vercel)
    runs-on: ubuntu-latest
    steps:
      - name: Code holen
        uses: actions/checkout@v4

      - name: Node.js 22 (wie .nvmrc / Vite 7)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install wie Vercel (keine devDependencies)
        run: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 ELECTRON_SKIP_BINARY_DOWNLOAD=1 NPM_CONFIG_omit=dev npm ci --omit=dev

      - name: Build wie Vercel
        run: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 NODE_OPTIONS=--max-old-space-size=6144 npm run build:vercel
